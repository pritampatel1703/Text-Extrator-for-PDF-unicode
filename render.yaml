databases:
  # ── PostgreSQL Database ──
  - name: pdf-postgres
    plan: starter # Starter plan recommended for pgvector & resources
    ipAllowList: [] # Allows access from Render services

services:
  # ── Redis Instance ──
  - type: redis
    name: pdf-redis
    plan: starter
    ipAllowList: []

  # ── Elasticsearch (Private Service) ──
  - type: pserv
    name: pdf-elasticsearch
    env: docker
    dockerfilePath: docker/elasticsearch/Dockerfile
    plan: standard # Elasticsearch requires at least 2GB RAM
    disk:
      name: es-data
      mountPath: /usr/share/elasticsearch/data
      sizeGB: 10
    envVars:
      - key: discovery.type
        value: single-node
      - key: xpack.security.enabled
        value: false
      - key: xpack.security.http.ssl.enabled
        value: false
      - key: ES_JAVA_OPTS
        value: -Xms1024m -Xmx1024m
      - key: cluster.name
        value: pdf-search-cluster

  # ── Backend (FastAPI) ──
  - type: web
    name: pdf-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: starter
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pdf-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pdf-redis
          property: connectionString
      - key: ELASTICSEARCH_URL
        value: http://pdf-elasticsearch:9200

  # ── Celery Worker ──
  - type: worker
    name: pdf-worker
    env: docker
    dockerfilePath: worker/Dockerfile
    plan: standard # OCR and embeddings need more RAM
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pdf-postgres
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: pdf-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: pdf-redis
          property: connectionString
      - key: ELASTICSEARCH_URL
        value: http://pdf-elasticsearch:9200

  # ── Frontend (Next.js) ──
  - type: web
    name: pdf-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: pdf-backend
          property: host
