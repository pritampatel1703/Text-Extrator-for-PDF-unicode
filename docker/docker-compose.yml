# Docker Compose — PDF Search Platform
# Run from project root: docker compose -f docker/docker-compose.yml up --build

services:
  # ── PostgreSQL with pgvector ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pdf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pdf_platform}
      POSTGRES_USER: ${POSTGRES_USER:-pdf_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdf_secure_password_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdf_admin} -d ${POSTGRES_DB:-pdf_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pdf_network

  # ── Elasticsearch 8.x ──
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: pdf_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
      - cluster.name=pdf-search-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - pdf_network

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: pdf_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - pdf_network

  # ── Backend (FastAPI) ──
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: pdf_backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pdf_admin}:${POSTGRES_PASSWORD:-pdf_secure_password_2024}@postgres:5432/${POSTGRES_DB:-pdf_platform}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - pdf_network

  # ── Celery Worker ──
  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    container_name: pdf_worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pdf_admin}:${POSTGRES_PASSWORD:-pdf_secure_password_2024}@postgres:5432/${POSTGRES_DB:-pdf_platform}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - pdf_network

  # ── Celery Flower (Monitor) ──
  flower:
    build:
      context: ../worker
      dockerfile: Dockerfile
    container_name: pdf_flower
    restart: unless-stopped
    command: celery -A celery_app flower --port=5555
    env_file:
      - ../.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pdf_network

  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: pdf_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pdf_network

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: pdf_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - pdf_network

volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
  redis_data:
    driver: local
  upload_data:
    driver: local

networks:
  pdf_network:
    driver: bridge
